<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <title>GUIDE</title>

  <style>
    a:hover {
      text-decoration: none !important;
      color: inherit !important;
      border: none !important;
    }
    .publication-authors a:hover {
      opacity: 0.8;
    }

    .hero.top-header {
      padding-bottom: 0 !important;
    }
    .hero-body {
      padding-bottom: 1.5rem !important;
    }

    .video-section {
      padding-top: 2rem;
      padding-bottom: 2rem;
    }

    .video-section:nth-of-type(even) {
      background: #f7f8fa;
    }

    .video-grid {
      display: grid;
      gap: 1.35rem;
      margin-top: 1.25rem;
    }

    .video-grid.two-column {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .video-grid.single-column {
      grid-template-columns: minmax(0, 1fr);
      max-width: 780px;
      margin-left: auto;
      margin-right: auto;
    }

    .video-item {
      margin: 0;
    }

    .video-title {
      min-height: 1.6rem;
      margin-bottom: 0.55rem;
      color: #1f2937;
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.35;
      text-align: center;
    }

    .video-frame {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #111827;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #d7dce3;
    }

    .video-frame video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      background: #111827;
    }

    .video-caption {
      min-height: 1.5rem;
      margin-top: 0.5rem;
      color: #4b5563;
      font-size: 0.92rem;
      line-height: 1.35;
      text-align: center;
    }

    @media screen and (max-width: 768px) {
      .video-grid.two-column {
        grid-template-columns: minmax(0, 1fr);
      }
    }
  </style>

  <meta name="title" content="GUIDE: Goal-Initialized Directional Understanding for End-to-End Visual Navigation">
  <meta name="description" content="GUIDE: A fully end-to-end reinforcement learning framework for goal-initialized visual navigation with internal egomotion and directional awareness.">
  <meta name="keywords" content="GUIDE, egomotion and directional awareness, reinforcement learning, visual navigation, quadruped robot">
  <meta name="author" content="Anonymous Authors">
  
  <link rel="stylesheet" href="static/css/bulma.min.css">
  <link rel="stylesheet" href="static/css/index.css">
  <link rel="preload" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <script defer src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script defer src="static/js/fontawesome.all.min.js"></script>
  <script defer src="static/js/index.js"></script>
</head>

  <button class="scroll-to-top" onclick="scrollToTop()" title="Scroll to top" aria-label="Scroll to top">

  </main>
